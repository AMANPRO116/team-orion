<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEAM ORION</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{--text:#fff;--accent:#00ff88}
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  color:var(--text);
  background:black;
  overflow-x:hidden;
}

/* STAR BACKGROUND */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:radial-gradient(white 1px, transparent 1px);
  background-size:50px 50px;
  animation:starsMove 60s linear infinite;
  opacity:0.15;
  z-index:-1;
}
@keyframes starsMove{
  from{transform:translate(0,0);}
  to{transform:translate(-500px,-500px);}
}

body::after{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(white 1px, transparent 1px);
  background-size:80px 80px;
  animation:twinkle 4s ease-in-out infinite alternate;
  opacity:0.2;
  z-index:-1;
}
@keyframes twinkle{
  0%{opacity:0.1}
  50%{opacity:0.3}
  100%{opacity:0.15}
}

/* SPLASH */
#splash{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:20000;
  pointer-events:none;
  animation:fadeOut 2s ease 3s forwards;
}
#splash img{max-width:60%;}

@keyframes fadeOut{
  to{opacity:0; visibility:hidden;}
}

/* NEON STRIPS */
#neonStrips{
  position:fixed;
  width:100%;
  height:100%;
  display:none;
  z-index:15000;
  pointer-events:none;
}
.strip{
  position:absolute;
  width:250%;
  height:6px;
  background:linear-gradient(90deg, transparent, #00ff88, #00ff88, transparent);
  filter:blur(10px);
  transform:rotate(45deg);
}
@keyframes stripMove{
  from{transform:translate(-120%,-120%) rotate(45deg);opacity:1}
  to{transform:translate(120%,120%) rotate(45deg);opacity:0}
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}
.hero h2{
  font-size:60px;
  text-shadow:0 0 20px #00ff88;
}
.hero p{color:#aaa}

/* CONTENT */
.section{padding:80px 40px; max-width:1100px; margin:auto;}
.grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px;}
.card{background:rgba(255,255,255,0.05); padding:20px; border-radius:12px;}
.card img, video{width:100%; border-radius:10px; margin-top:10px;}

/* MODEL */
.model-container{
  position:fixed;
  bottom:20px;
  right:20px;
  width:180px;
  height:180px;
}

/* TEAM */
.team-img{width:100%; height:220px; object-fit:cover; border-radius:10px;}
.linkedin-btn{
  display:inline-block;
  margin-top:8px;
  padding:6px 12px;
  border-radius:20px;
  background:var(--accent);
  color:#000;
  font-size:12px;
  text-decoration:none;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="team_orion_final.png">
</div>

<!-- NEON STRIPS -->
<div id="neonStrips">
  <div class="strip"></div>
  <div class="strip"></div>
</div>

<!-- HERO -->
<section class="hero">
<h2>TEAM ORION</h2>
<p>Next-generation stealth platform</p>

<div onclick="toggleCatalog()" style="margin-top:40px; cursor:pointer;">
  <div style="padding:25px; border:1px solid #444; border-radius:12px;">
    <h3>F-35D Project</h3>
    <p style="color:#aaa;">Click to explore mission data</p>
  </div>
</div>
</section>

<!-- PROJECT -->
<div id="projectContent" style="display:none;">

<section class="section">
<h2>Project Overview</h2>
<div class="card">
<img src="F35_render1.png">
<img src="F35_top_view.png">
</div>
</section>

<section class="section">
<h2>Simulation</h2>
<div class="grid">
<div class="card"><video autoplay muted loop src="simulation1.mp4"></video></div>
<div class="card"><video autoplay muted loop src="simulation2.mp4"></video></div>
</div>
</section>

<section class="section">
<h2>Team</h2>
<div class="grid">
<div class="card"><img class="team-img" src="aman.jpeg"><b>Aman</b></div>
<div class="card"><img class="team-img" src="rohan.jpeg"><b>Rohan</b></div>
<div class="card"><img class="team-img" src="mokshagna.jpeg"><b>Mokshagna</b></div>
<div class="card"><img class="team-img" src="rukesh.jpeg"><b>Rukesh</b></div>
<div class="card"><img class="team-img" src="abhinav.jpeg"><b>Abhinav</b></div>
</div>
</section>

</div>

<!-- MODEL -->
<div class="model-container">
<model-viewer src="plane.glb" auto-rotate camera-controls></model-viewer>
</div>

<script>
function toggleCatalog(){
  const el = document.getElementById('projectContent');
  if(el.style.display === 'none' || el.style.display === ''){
    el.style.display = 'block';
    el.scrollIntoView({behavior:'smooth'});
  } else {
    el.style.display = 'none';
  }
}

// intro (SAFE)
setTimeout(()=>{
  document.getElementById('splash').remove();

  const strips = document.getElementById('neonStrips');
  strips.style.display='block';

  document.querySelectorAll('.strip').forEach((s,i)=>{
    s.style.animation = 'stripMove 1.2s ease forwards';
    s.style.animationDelay = (i*0.2)+'s';
  });

  setTimeout(()=> strips.style.display='none',1500);

},4000);
</script>

</body>
</html>
