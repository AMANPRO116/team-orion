<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEAM ORION</title>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#050505;
  --text:#ffffff;
  --accent:#00ff88;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* NAVBAR */
header{
  position:fixed;
  top:0;
  width:100%;
  padding:20px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  backdrop-filter: blur(20px);
  background:rgba(0,0,0,0.4);
  z-index:1000;
}

header h1{
  font-size:18px;
  letter-spacing:2px;
  color:var(--accent);
}

.nav a{
  margin-left:20px;
  text-decoration:none;
  color:#aaa;
  transition:0.3s;
}
.nav a:hover{color:white}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h2{
  font-size:60px;
  font-weight:700;
}

.hero p{
  margin-top:10px;
  color:#aaa;
}

/* SCROLL EFFECT */
.section{
  padding:120px 40px;
  max-width:1200px;
  margin:auto;
  opacity:0;
  transform:translateY(40px);
  transition:1s;
}

.section.show{
  opacity:1;
  transform:translateY(0);
}

/* CARDS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:rgba(255,255,255,0.03);
  border-radius:16px;
  padding:20px;
  transition:0.4s;
}

.card:hover{
  transform:scale(1.03);
  background:rgba(255,255,255,0.08);
}

/* TEAM */
.team-img{
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:12px;
}

.linkedin-btn{
  display:inline-block;
  margin-top:8px;
  padding:6px 12px;
  border-radius:20px;
  background:var(--accent);
  color:#000;
  font-size:12px;
  text-decoration:none;
}

/* MODEL */
.model-container{
  position:fixed;
  bottom:20px;
  right:20px;
  width:180px;
  height:180px;
}

/* BACK BTN */
.back{
  position:fixed;
  top:80px;
  left:20px;
  padding:10px;
  background:var(--accent);
  color:black;
  border:none;
  border-radius:8px;
  display:none;
}

.hidden{display:none}

</style>
</head>

<body>

<header>
<h1>TEAM ORION</h1>
<div class="nav">
<a href="#">Home</a>
<a href="#">Project</a>
<a href="#">Team</a>
</div>
</header>

<section class="hero">
<h2>F-35D UAV</h2>
<p>Next-generation stealth platform</p>
</section>

<section class="section" id="project">
<h2>Project Overview</h2>
<p>Inspired by modern fighter jet aerodynamics and stealth design principles.</p>
</section>

<section class="section">
<h2>Team</h2>
<div class="grid">
<div class="card"><img class="team-img" src="aman.jpeg"><b>Aman</b><br><a class="linkedin-btn" href="#">LinkedIn</a></div>
<div class="card"><img class="team-img" src="rohan.jpeg"><b>Rohan</b></div>
<div class="card"><img class="team-img" src="mokshagna.jpeg"><b>Mokshagna</b></div>
<div class="card"><img class="team-img" src="rukesh.jpeg"><b>Rukesh</b></div>
<div class="card"><img class="team-img" src="abhinav.jpeg"><b>Abhinav</b></div>
</div>
</section>

<div class="model-container">
<model-viewer src="plane.glb" auto-rotate camera-controls></model-viewer>
</div>

<script>

// scroll animation
const sections = document.querySelectorAll('.section');
window.addEventListener('scroll', () => {
  sections.forEach(sec => {
    const top = sec.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      sec.classList.add('show');
    }
  });
});

</script>

</body>
</html>
