<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEAM ORION - SIMULATION MODE</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{--accent:#00ff88}
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:black;
  color:white;
  overflow:hidden;
}

/* VIDEO */
#bgVideo{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  z-index:-2;
  transition:1s;
}

/* HUD */
#hud{
  position:fixed;
  width:100%;
  height:100%;
  pointer-events:none;
  color:#00ff88;
  font-family:monospace;
  z-index:10;
}
.crosshair{
  position:absolute;
  width:80px;
  height:80px;
  border:2px solid #00ff88;
  transform:translate(-50%,-50%);
}

/* telemetry */
#telemetry{
  position:fixed;
  bottom:20px;
  left:20px;
  font-size:12px;
}

/* splash */
#splash{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

/* model */
.model-container{
  position:fixed;
  width:300px;
  height:300px;
  bottom:50%;
  right:50%;
  transform:translate(50%,50%);
}
</style>
</head>

<body>

<!-- VIDEO -->
<video id="bgVideo" autoplay muted loop>
<source src="your_background_video.mp4">
</video>

<!-- SPLASH -->
<div id="splash">
<img src="team_orion_final.png" style="width:300px;">
</div>

<!-- HUD -->
<div id="hud">
<div class="crosshair"></div>

<div id="telemetry">
SPD: <span id="speed">0</span><br>
ALT: <span id="alt">0</span><br>
HDG: <span id="heading">0</span>
</div>
</div>

<!-- MODEL -->
<div class="model-container">
<model-viewer id="plane" src="plane.glb" auto-rotate camera-controls></model-viewer>
</div>

<script>
/* INTRO */
setTimeout(()=>{
document.getElementById('splash').style.display='none';
document.getElementById('bgVideo').style.opacity=0.4;
},3000);

/* VOICE */
function speak(msg){
speechSynthesis.speak(new SpeechSynthesisUtterance(msg));
}
setTimeout(()=>speak("Simulation mode activated"),2000);

/* CROSSHAIR */
const crosshair=document.querySelector('.crosshair');
document.addEventListener('mousemove',(e)=>{
crosshair.style.left=e.clientX+'px';
crosshair.style.top=e.clientY+'px';
});

/* FLIGHT SIMULATION */
const model=document.getElementById('plane');

let pitch=75;
let yaw=0;
let speed=0;
let altitude=0;

document.addEventListener('keydown',(e)=>{
if(e.key==='w') pitch-=2;
if(e.key==='s') pitch+=2;
if(e.key==='a') yaw-=5;
if(e.key==='d') yaw+=5;

if(e.key==='ArrowUp') speed+=10;
if(e.key==='ArrowDown') speed-=10;

model.cameraOrbit=`${yaw}deg ${pitch}deg 2.5m`;
});

/* INERTIA */
setInterval(()=>{
speed*=0.98;
altitude+=speed*0.1;

document.getElementById('speed').innerText=Math.floor(speed);
document.getElementById('alt').innerText=Math.floor(altitude);
document.getElementById('heading').innerText=yaw;
},100);

/* THREAT SYSTEM */
setInterval(()=>{
if(Math.random()>0.7){
speak("Warning incoming threat");
document.querySelector('.crosshair').style.borderColor="red";
}else{
document.querySelector('.crosshair').style.borderColor="#00ff88";
}
},6000);
</script>

</body>
</html>
